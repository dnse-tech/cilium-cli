name: Build s390x mirror image (cilium-cli)

# Cross-builds the linux/s390x cilium-cli image on an X64 self-hosted runner,
# then folds it together with upstream's prebuilt linux/amd64 + linux/arm64
# image into a multiarch manifest published under ghcr.io/dnse-tech. Upstream
# layers are never rebuilt -- only re-referenced -- so the amd64/arm64 manifests
# remain byte for byte the official Cilium release.
#
# Unlike the certgen/hubble-ui mirrors, NO QEMU is required here: cilium-cli's
# Dockerfile pins its Go builder to --platform=${BUILDPLATFORM}, so the s390x
# binary is produced by native cross-compilation (CGO_ENABLED=0, GOARCH=s390x)
# on the amd64 runner. The final stage is gcr.io/distroless/static:latest --
# a multiarch base -- and only COPYs the binary in, so nothing s390x ever
# executes at build time.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "cilium-cli release version to mirror (must exist upstream for amd64/arm64)"
        required: true
        default: "v0.19.5"
  push:
    tags:
      # e.g. v0.19.5-s390x
      - "v[0-9]+.[0-9]+.[0-9]+-s390x"

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_REGISTRY: quay.io/cilium
  TARGET_REGISTRY: ghcr.io/dnse-tech
  IMAGE: cilium-cli

jobs:
  mirror-s390x:
    name: Cross-build s390x and merge with upstream
    runs-on: [self-hosted, X64, "os:ubuntu-24.04"]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the requested release tag can be checked out
          # and `git describe --tags` stamps the correct CLIVersion ldflag.
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: ver
        run: |
          v="${{ github.event.inputs.version }}"
          [ -z "$v" ] && v="${GITHUB_REF_NAME%-s390x}"
          case "$v" in v[0-9]*) ;; *) v="v0.19.5" ;; esac
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push s390x image
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Check out the upstream source at the requested tag so the compiled
          # binary carries the correct CLIVersion ldflag (from git describe).
          git checkout --force "refs/tags/${VERSION}"
          docker buildx build \
            --platform linux/s390x \
            --provenance=false --sbom=false \
            -f Dockerfile \
            -t "${TARGET_REGISTRY}/${IMAGE}:${VERSION}-s390x" \
            --push .

      - name: Create multiarch manifest (upstream amd64/arm64 + our s390x)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # imagetools create copies the referenced upstream (amd64+arm64)
          # manifests and our s390x manifest into one multiarch list in the
          # target repo. Upstream images are not rebuilt, only re-referenced.
          docker buildx imagetools create \
            -t "${TARGET_REGISTRY}/${IMAGE}:${VERSION}" \
            "${UPSTREAM_REGISTRY}/${IMAGE}:${VERSION}" \
            "${TARGET_REGISTRY}/${IMAGE}:${VERSION}-s390x"

          digest=$(docker buildx imagetools inspect \
            "${TARGET_REGISTRY}/${IMAGE}:${VERSION}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "${TARGET_REGISTRY}/${IMAGE}:${VERSION}@${digest}" \
            | tee image-digest-${IMAGE}-${VERSION}.txt

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-cilium-cli-s390x-mirror
          path: image-digest-*.txt
